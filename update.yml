name: Update intelligence data

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated JSON files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: add NCBI_API_KEY here if you have one for higher PubMed rate limits
          # NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update intelligence data [$(date -u +%Y-%m-%dT%H:%M)Z]"
          git push
