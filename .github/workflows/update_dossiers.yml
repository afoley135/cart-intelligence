name: Update company dossiers

on:
  schedule:
    # Runs every Monday at 07:00 UTC (after the daily pipeline)
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  dossiers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dossiers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetchers/fetch_dossiers.py

      - name: Commit dossiers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dossiers.json
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/dossiers.json
          git diff --staged --quiet || git commit -m "chore: update company dossiers [$(date -u +%Y-%m-%dT%H:%M)Z]"
          git push
